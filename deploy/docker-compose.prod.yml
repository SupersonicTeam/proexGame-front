# Compose de PRODUÇÃO (VPS) do FRONT. Espelha o do backend: não builda nada —
# puxa a imagem já publicada no ghcr.io. A tag vem de IMAGE_TAG no .env (o CI
# atualiza a cada deploy).
#
# O contêiner é exposto só em 127.0.0.1:${FRONT_PORT} → o Nginx do host faz o
# proxy/TLS (ver deploy/nginx-host.conf), igual ao backend.
services:
  frontend:
    # FRONT_IMAGE deve ser o mesmo caminho que o CI publica:
    #   ghcr.io/<owner>/<repo> (tudo minúsculo). Definir no .env da VPS.
    image: ${FRONT_IMAGE:-ghcr.io/supersonicteam/proexgame-front}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '127.0.0.1:${FRONT_PORT:-8080}:80'
