# Nginx do HOST (VPS) para o jogo — jogar.weissmurillo.de
# Copie para /etc/nginx/sites-available/jogar, ative o symlink e rode o certbot.
# Roteia:  /socket.io/ → backend (127.0.0.1:3003)  ·  /  → front (127.0.0.1:8080)

server {
    listen 80;
    server_name jogar.weissmurillo.de;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name jogar.weissmurillo.de;

    ssl_certificate     /etc/letsencrypt/live/jogar.weissmurillo.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jogar.weissmurillo.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket / Socket.IO → contêiner do backend.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Front (SPA) → contêiner do front.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
