# Nginx do HOST (VPS) — referência. Substitui o root estático por um proxy para
# o contêiner do front. Faz TLS (via certbot) e roteia:
#   /socket.io/  → contêiner do BACKEND  (127.0.0.1:3003)
#   /            → contêiner do FRONT     (127.0.0.1:8080)
#
# Copie para /etc/nginx/sites-available/jogo, troque SEU_DOMINIO, ative o symlink
# e rode `certbot --nginx -d jogo.SEU_DOMINIO` (ele adiciona o bloco 443/TLS).
server {
    listen 80;
    server_name jogo.SEU_DOMINIO;

    # WebSocket / Socket.IO → backend (container do jogo em 127.0.0.1:3003).
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Front (SPA) → container do front em 127.0.0.1:8080.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
