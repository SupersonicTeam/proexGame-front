# Nginx do CONTÊINER do front: serve o SPA (build do Vite) com fallback de rota.
# O TLS e o proxy de /socket.io/ para o backend ficam no Nginx do HOST
# (ver deploy/nginx-host.conf). Aqui é só servir os arquivos estáticos.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Assets com hash podem ser cacheados agressivamente.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: qualquer rota cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
