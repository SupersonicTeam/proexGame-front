# Release & Deploy — dispara quando algo entra na main (PR mergeado).
#
# Diferente do backend (que publica imagem Docker no ghcr), o FRONT é um site
# estático: o build (`dist/`) é enviado para a VPS e servido pelo Nginx do host
# em /var/www/jogo (o mesmo Nginx faz proxy de /socket.io/ para o backend).
#
# Fluxo:
#   1) Deriva a versão por Conventional Commits, cria a tag vX.Y.Z + GitHub Release.
#   2) Builda o site estático (produção → conecta no backend do mesmo domínio).
#   3) SSH na VPS: substitui o conteúdo de /var/www/jogo pelo novo build.
name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write # criar tag + release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Versionar e publicar release
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - name: Checkout (histórico completo p/ ler os commits)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calcular versão e criar a tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: 'v'

      - name: Publicar GitHub Release com changelog
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  build-and-deploy:
    name: Build estático e deploy na VPS
    needs: release
    if: ${{ needs.release.outputs.new_tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção
        run: npm run build
        env:
          # Vazio → o front conecta no backend do MESMO domínio (Nginx faz o
          # proxy de /socket.io/). Defina a variável de repositório
          # VITE_BACKEND_URL só se o backend estiver em outro domínio.
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}

      - name: Empacotar o build
        run: tar -czf dist.tar.gz -C dist .

      - name: Enviar o pacote para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: dist.tar.gz
          target: /tmp/proexgame-front

      - name: Publicar no diretório do Nginx
        uses: appleboy/ssh-action@v1
        env:
          # Diretório servido pelo Nginx (root do site). Default: /var/www/jogo.
          WEB_DIR: ${{ secrets.VPS_WEB_DIR }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: WEB_DIR
          script: |
            set -e
            DIR="${WEB_DIR:-/var/www/jogo}"
            # Requisito: VPS_USER deve ser dono de $DIR (sem sudo no CI).
            # Ex. (uma vez na VPS): sudo chown -R $USER:www-data /var/www/jogo
            mkdir -p "$DIR"
            # Substitui o conteúdo antigo pelo novo build (SPA).
            rm -rf "$DIR"/*
            tar -xzf /tmp/proexgame-front/dist.tar.gz -C "$DIR"
            rm -f /tmp/proexgame-front/dist.tar.gz
