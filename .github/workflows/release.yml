# Release & Deploy — dispara quando algo entra na main (PR mergeado).
#
# Mesmo modelo do backend: o FRONT vira uma imagem Docker (Nginx servindo o SPA)
# publicada no ghcr.io; a VPS puxa a imagem e sobe via docker compose. O Nginx
# do HOST faz TLS e roteia / → contêiner do front e /socket.io/ → backend.
#
# Fluxo:
#   1) Deriva a versão por Conventional Commits, cria a tag vX.Y.Z + GitHub Release.
#   2) Builda a imagem Docker e publica no ghcr.io: :vX.Y.Z + :latest.
#   3) SSH na VPS: atualiza IMAGE_TAG, `docker compose pull` + `up -d`.
name: Release & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write # criar tag + release
  packages: write # publicar imagem no ghcr

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Versionar e publicar release
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
    steps:
      - name: Checkout (histórico completo p/ ler os commits)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calcular versão e criar a tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: 'v'

      - name: Publicar GitHub Release com changelog
        if: ${{ steps.tag.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

  build-and-deploy:
    name: Build da imagem e deploy na VPS
    needs: release
    if: ${{ needs.release.outputs.new_tag != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver nome da imagem (ghcr exige minúsculas)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem (tag + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ needs.release.outputs.new_version }}
            ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.release.outputs.new_version }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_DIR }}"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            if grep -q '^IMAGE_TAG=' .env 2>/dev/null; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
            fi
            docker compose pull
            docker compose up -d
            docker image prune -f
